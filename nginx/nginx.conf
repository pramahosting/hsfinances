server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Service worker kill-switch — must never be cached
    location = /sw.js {
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # Cache static assets aggressively (hashed filenames from Vite)
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PDF documents — allow inline viewing
    location ~* \.pdf$ {
        add_header Content-Disposition "inline";
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — all routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint (used by Northflank)
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
